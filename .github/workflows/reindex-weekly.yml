name: Reindex and Build Site

on:
  schedule:
    # Toda segunda-feira às 08:00 UTC (05:00 horário de Brasília)
    - cron: "0 8 * * 1"
  # Permite rodar manualmente pela aba Actions do GitHub
  workflow_dispatch:
  # Roda também após qualquer push em kb/, .claude/skills/ ou static/
  push:
    paths:
      - "kb/**"
      - ".claude/skills/**"
      - "static/**"
      - "scripts/build-site.py"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Build static site
        run: python scripts/build-site.py

      - name: Run gap analysis
        run: python scripts/gap-analysis.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/
          git diff --staged --quiet || git commit -m "chore: rebuild site [skip ci]"
          git pull --rebase
          git push
