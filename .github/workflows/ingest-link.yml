name: Ingest Link

on:
  issues:
    types: [labeled]

jobs:
  ingest:
    # Só roda quando a label "add-link" é aplicada (evita duplo trigger com opened)
    if: github.event.label.name == 'add-link'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install anthropic requests beautifulsoup4 youtube-transcript-api

      - name: Extract URL from issue body
        id: extract
        run: |
          BODY="${{ github.event.issue.body }}"
          URL=$(echo "$BODY" | grep -oE 'https?://[^ ]+' | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Run ingest script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_URL: ${{ steps.extract.outputs.url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python scripts/ingest.py

      - name: Validar arquivo gerado
        run: |
          LATEST=$(ls -t kb/*.md 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then
            echo "❌ Nenhum arquivo .md encontrado em kb/" && exit 1
          fi
          LINES=$(wc -l < "$LATEST")
          if [ "$LINES" -lt 5 ]; then
            echo "❌ Arquivo gerado muito pequeno ($LINES linhas): $LATEST" && exit 1
          fi
          if ! grep -q "^titulo:" "$LATEST"; then
            echo "❌ Frontmatter 'titulo:' ausente em $LATEST" && exit 1
          fi
          echo "✅ Arquivo válido: $LATEST ($LINES linhas)"

      - name: Atualizar CHANGELOG da KB
        run: |
          LATEST=$(ls -t kb/*.md | head -1)
          TITULO=$(grep "^titulo:" "$LATEST" | sed 's/titulo: //' | tr -d '"')
          URL="${{ steps.extract.outputs.url }}"
          DATA=$(date -u +"%Y-%m-%d")
          echo "- $DATA | [$TITULO]($URL)" >> kb/CHANGELOG.md
          echo "Entrada adicionada ao CHANGELOG: $TITULO"

      - name: Rebuild site
        run: python scripts/build-site.py

      - name: Commit new file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kb/ .claude/skills/README.md
          git add -f docs/
          git diff --staged --quiet && echo "Nada para commitar" && exit 0
          git commit -m "feat: ingest link from issue #${{ github.event.issue.number }}"
          git pull --rebase origin main
          git push

      - name: Close issue with comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('kb').filter(f => f.endsWith('.md'));
            const latest = files.sort().reverse()[0];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Conteúdo processado e salvo em \`kb/${latest}\``
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
