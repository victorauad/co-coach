name: Sync Skills para Repos Registrados

on:
  push:
    branches: [main]
    paths:
      - "skills/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout co-coach
        uses: actions/checkout@v4

      - name: Validar skills antes de sincronizar
        run: |
          ERROS=0
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="$skill_dir/SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "❌ $skill_name: SKILL.md ausente" && ERROS=$((ERROS+1))
              continue
            fi
            if ! grep -q "^name:" "$skill_file"; then
              echo "❌ $skill_name: frontmatter 'name:' ausente" && ERROS=$((ERROS+1))
            fi
            if ! grep -q "^description:" "$skill_file"; then
              echo "❌ $skill_name: frontmatter 'description:' ausente" && ERROS=$((ERROS+1))
            fi
          done
          if [ "$ERROS" -gt 0 ]; then
            echo "❌ $ERROS erro(s) encontrados — sync abortado" && exit 1
          fi
          echo "✅ Todas as skills validadas"

      - name: Instalar yq para ler YAML
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Remover skills com nomenclatura antiga dos repos registrados
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -e

          # Skills renomeadas/removidas — paths legados a deletar nos repos alvo
          DEPRECATED_SKILLS=(
            ".claude/skills/coach-claude-code/SKILL.md"
            ".claude/skills/setup-review/SKILL.md"
            ".claude/skills/bigquery-workflow/SKILL.md"
          )

          REPOS=$(yq e '.repos[]' config/sync-targets.yml)

          for repo in $REPOS; do
            echo "--- Limpando skills antigas em: $repo ---"
            for path in "${DEPRECATED_SKILLS[@]}"; do
              response=$(curl -s -w "%{http_code}" -o /tmp/check_resp.json \
                -H "Authorization: Bearer $GH_PAT" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$repo/contents/$path")

              if [ "$response" = "200" ]; then
                sha=$(python3 -c "import sys, json; print(json.load(open('/tmp/check_resp.json')).get('sha',''))")
                skill_name=$(basename "$(dirname "$path")")

                del_status=$(curl -s -o /dev/null -w "%{http_code}" \
                  -X DELETE \
                  -H "Authorization: Bearer $GH_PAT" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/$repo/contents/$path" \
                  -d "{\"message\": \"chore: remover skill legada $skill_name (renomeada para co-coach-*)\", \"sha\": \"$sha\"}")

                if [ "$del_status" = "200" ]; then
                  echo "  🗑️  $skill_name removida de $repo"
                else
                  echo "  ⚠️  Falha ao remover $skill_name de $repo (HTTP $del_status) — continuando"
                fi
              else
                echo "  ✓ $path não existe em $repo — ok"
              fi
            done
          done

      - name: Sincronizar todas as skills para repos registrados
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -e

          REPOS=$(yq e '.repos[]' config/sync-targets.yml)

          for repo in $REPOS; do
            echo ""
            echo "=== Sincronizando skills em: $repo ==="

            for skill_dir in skills/*/; do
              skill_name=$(basename "$skill_dir")
              skill_file="$skill_dir/SKILL.md"

              if [ ! -f "$skill_file" ]; then
                echo "  Pulando $skill_name (sem SKILL.md)"
                continue
              fi

              target_path=".claude/skills/$skill_name/SKILL.md"
              encoded_content=$(base64 -w 0 "$skill_file")

              # Busca SHA se arquivo já existir (necessário para update)
              sha_param=""
              response=$(curl -s -w "%{http_code}" -o /tmp/skill_check.json \
                -H "Authorization: Bearer $GH_PAT" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$repo/contents/$target_path")

              if [ "$response" = "200" ]; then
                sha=$(python3 -c "import sys, json; print(json.load(open('/tmp/skill_check.json')).get('sha',''))")
                sha_param=", \"sha\": \"$sha\""
              fi

              http_status=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
                -X PUT \
                -H "Authorization: Bearer $GH_PAT" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$repo/contents/$target_path" \
                -d "{\"message\": \"skill: sync $skill_name via co-coach\", \"content\": \"$encoded_content\"$sha_param}")

              if [ "$http_status" = "200" ] || [ "$http_status" = "201" ]; then
                echo "  ✅ $skill_name"
              else
                echo "  ❌ Erro em $skill_name (HTTP $http_status):"
                cat /tmp/api_response.json
                exit 1
              fi
            done

            echo "  → Skills sincronizadas em $repo/.claude/skills/"
          done

      - name: Gerar dashboard de sync (config/sync-status.md)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -e

          REPOS=$(yq e '.repos[]' config/sync-targets.yml)
          DATA=$(date -u '+%Y-%m-%d %H:%M UTC')
          SKILLS=$(ls skills/ | tr '\n' ' ')
          SKILL_COUNT=$(ls skills/ | wc -l | tr -d ' ')

          {
            echo "# Sync Status"
            echo ""
            echo "> Atualizado em: $DATA"
            echo ""
            echo "| Repo | Skills instaladas | Último sync |"
            echo "|------|-------------------|-------------|"
            for repo in $REPOS; do
              echo "| \`$repo\` | $SKILL_COUNT skills | $DATA |"
            done
            echo ""
            echo "## Skills sincronizadas ($SKILL_COUNT)"
            echo ""
            for skill in $SKILLS; do
              echo "- \`$skill\`"
            done
          } > /tmp/sync-status.md

          encoded=$(base64 -w 0 /tmp/sync-status.md)

          # Busca SHA atual do arquivo (se existir) para fazer update
          sha_param=""
          response=$(curl -s -w "%{http_code}" -o /tmp/status_check.json \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/config/sync-status.md")

          if [ "$response" = "200" ]; then
            sha=$(python3 -c "import sys, json; print(json.load(open('/tmp/status_check.json')).get('sha',''))")
            sha_param=", \"sha\": \"$sha\""
          fi

          http_status=$(curl -s -o /tmp/status_response.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/config/sync-status.md" \
            -d "{\"message\": \"chore: atualizar sync-status.md [$DATA]\", \"content\": \"$encoded\"$sha_param}")

          if [ "$http_status" = "200" ] || [ "$http_status" = "201" ]; then
            echo "✅ config/sync-status.md atualizado em ${GITHUB_REPOSITORY}"
          else
            echo "⚠️ Falha ao salvar sync-status.md (HTTP $http_status) — não bloqueia o sync"
            cat /tmp/status_response.json
          fi
