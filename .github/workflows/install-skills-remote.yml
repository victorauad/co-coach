name: Install Skills in Remote Repo

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Repo alvo (ex: victorauad/iracing_analysis)"
        required: true
        type: string
      overwrite:
        description: "Sobrescrever skills existentes?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout co-coach
        uses: actions/checkout@v4

      - name: Instalar skills no repo alvo via API GitHub
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_REPO: ${{ inputs.target_repo }}
          OVERWRITE: ${{ inputs.overwrite }}
        run: |
          set -e

          echo "Instalando skills em: $TARGET_REPO"

          for skill_dir in .claude/skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="$skill_dir/SKILL.md"

            if [ ! -f "$skill_file" ]; then
              echo "  Pulando $skill_name (sem SKILL.md)"
              continue
            fi

            target_path=".claude/skills/$skill_name/SKILL.md"
            encoded_content=$(base64 -w 0 "$skill_file")

            # Verifica se o arquivo já existe no repo alvo
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$TARGET_REPO/contents/$target_path")

            if [ "$response" = "200" ] && [ "$OVERWRITE" = "false" ]; then
              echo "  ⚠️  $skill_name já existe em $TARGET_REPO — pulando (use overwrite=true para forçar)"
              continue
            fi

            # Busca SHA para update (necessário se arquivo existe)
            sha_param=""
            if [ "$response" = "200" ]; then
              sha=$(curl -s \
                -H "Authorization: Bearer $GH_PAT" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$TARGET_REPO/contents/$target_path" \
                | python3 -c "import sys, json; print(json.load(sys.stdin).get('sha',''))")
              sha_param=", \"sha\": \"$sha\""
            fi

            # Cria ou atualiza o arquivo
            http_status=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$TARGET_REPO/contents/$target_path" \
              -d "{\"message\": \"skill: instalar $skill_name via co-coach\", \"content\": \"$encoded_content\"$sha_param}")

            if [ "$http_status" = "200" ] || [ "$http_status" = "201" ]; then
              echo "  ✅ $skill_name instalada em $TARGET_REPO"
            else
              echo "  ❌ Erro ao instalar $skill_name (HTTP $http_status):"
              cat /tmp/api_response.json
              exit 1
            fi
          done

          echo ""
          echo "Concluído. Skills instaladas em $TARGET_REPO/.claude/skills/"
          echo "Próximo passo: abra uma sessão Claude Code no $TARGET_REPO e invoque /coach-claude-code"
